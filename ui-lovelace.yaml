title: Home

resources: #color for system tab on overview
  - url: /local/community/lovelace-card-mod/card-mod.js
    type: module

views:
  - title: Overview
    path: overview
    icon: mdi:home
    cards:

      # WHO'S HOME
      - type: entities
        title: Who's Home
        entities:
          - entity: person.edward_ciarletta
            name: Edward
          - entity: person.jackie_ciarletta
            name: Jackie
          - entity: person.chris_ciarletta
            name: Chris
          - entity: person.callie_ciarletta
            name: Callie

      # LOCKS
      - type: glance
        title: Locks
        columns: 2
        entities:
          - entity: lock.front_door_lock
            name: Front Door
          - entity: lock.downstairs_kitchen_door_lock
            name: Kitchen Door
          - entity: lock.gym_door_lock
            name: Gym Door
          - entity: lock.shed_door_lock
            name: Shed Door

      # CAMERAS
      - type: horizontal-stack
        cards:
          - type: picture-glance
            title: Front Door
            camera_image: camera.front_door_fluent
            entities:
              - entity: lock.front_door_lock
              - entity: binary_sensor.front_door_motion
          - type: picture-glance
            title: Back Door
            camera_image: camera.back_door_fluent
            entities:
              - entity: lock.downstairs_kitchen_door_lock
              - entity: binary_sensor.back_door_motion

      # MEDIA
      - type: entities
        title: Speakers
        entities:
          - entity: media_player.living_room_speaker
            name: Living Room
          - entity: media_player.chris_room_speaker
            name: Chris' Room
          - entity: media_player.bathroom_speaker
            name: Bathroom

      - type: media-control
        entity: media_player.denon_avr_x4800h
        name: Home Theatre

      # SYSTEM
      - type: entities
        title: System
        entities:
          - entity: sensor.cerberus_ups_battery
            name: UPS Battery
            card_mod:
              style: |
                :host {
                  --state-icon-color:
                    {% if states('sensor.cerberus_ups_battery') | int < 26 %} red
                    {% elif states('sensor.cerberus_ups_battery') | int < 51 %} orange
                    {% else %} green
                    {% endif %};
                }
          - entity: sensor.cerberus_ups_time_left
            name: UPS Time Left
          - entity: sensor.cerberus_ups_load
            name: UPS Load
          - entity: sensor.cerberus_ups_status
            name: UPS Status