      - action: notify.mobile_app_pixel_8_pro
        data:
          title: "🎮 Welcome Home!"
          message: "Chris is home! 🎮"
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_chris
        data:
          option: Home
      - delay:
          hours: 4
      - condition: state
        entity_id: input_select.presence_chris
        state: Home
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_chris
        data:
          option: "Timeout (Home)"
