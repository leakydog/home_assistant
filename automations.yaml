- id: '1769196485065'
  alias: Doorbell - Unified Multi-Chime Control
  description: Sets chimes to citybird for Backdoor or hophop for Frontdoor, then
    rings all four.
  triggers:
  - trigger: state
    entity_id: binary_sensor.back_door_visitor
    to: 'on'
    id: back_door_pressed
  - trigger: state
    entity_id: binary_sensor.front_door_visitor
    to: 'on'
    id: front_door_pressed
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: back_door_pressed
      sequence:
      - action: select.select_option
        target:
          entity_id:
          - select.reolink_chime_visitor_ringtone
          - select.reolink_chime_livingroom_visitor_ringtone
          - select.reolink_chime_office_visitor_ringtone
          - select.reolink_chime_theatre_visitor_ringtone
        data:
          option: citybird
    - conditions:
      - condition: trigger
        id: front_door_pressed
      sequence:
      - action: select.select_option
        target:
          entity_id:
          - select.reolink_chime_visitor_ringtone
          - select.reolink_chime_livingroom_visitor_ringtone
          - select.reolink_chime_office_visitor_ringtone
          - select.reolink_chime_theatre_visitor_ringtone
        data:
          option: hophop
  - delay:
      milliseconds: 800
  - action: reolink.play_chime
    data:
      device_id:
      - 0e6c25a3b779221e29ef378ffb59bbe3
      - 6130187660a8594d32f8541bb6b4575f
      - d31b9c5d2e4808a8a4b615f82eb1a7aa
      - 2acc59745f64740a0dcc0013ea902ca5
  mode: restart
- id: dog_barking_let_jelly_in
  alias: Dog Barking - Let Jelly In
  description: >
    When Frigate detects sustained barking at either door during waking hours
    (7am-8pm), announce over multiple speakers asking Chris/Callie to let Jelly
    in. 3-second trigger debounce filters false blips; 3-minute cooldown
    prevents announcement spam while Jelly is still outside barking.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.back_door_bark_sound
    - binary_sensor.front_door_bark_sound
    to: 'on'
    for: '00:00:03'
  conditions:
  - condition: time
    after: '07:00:00'
    before: '20:00:00'
  actions:
  - action: tts.speak
    target:
      entity_id: tts.google_translate_en_com
    data:
      media_player_entity_id:
      - media_player.living_room_speaker
      - media_player.chris_room_speaker
      - media_player.bathroom_speaker
      message: Chris and Callie, please let Jelly in
  # 3-minute cooldown: mode: single blocks re-entry while the delay is running.
  - delay: '00:03:00'
  mode: single
