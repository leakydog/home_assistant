- id: facial_recognition_eddie_home
  alias: Presence - Eddie Arrived Home
  description: >
    Plays a low-volume jazz radio stream on the living room speaker when
    Eddie is recognized at either door. Uses SomaFM Groove Salad (ambient/
    downtempo jazz, royalty-free streaming). The old automation had
    `media_content_id: muted jazz` which was a human label, not a valid
    Cast media id — silently failed since install. Fixed 2026-04-09.
    See ideas/2026-04-09-eddie-welcome-music.md for the research.
  triggers:
  - trigger: state
    entity_id: sensor.front_door_last_recognized_face
    to: Eddie Ciarletta
  - trigger: state
    entity_id: sensor.back_door_last_recognized_face
    to: Eddie Ciarletta
  conditions:
  - condition: time
    after: '07:00:00'
    before: '23:00:00'
  - condition: state
    entity_id: media_player.living_room_speaker
    state:
    - 'off'
    - 'idle'
  actions:
  - action: media_player.volume_set
    target:
      entity_id: media_player.living_room_speaker
    data:
      volume_level: 0.2
  - action: media_player.play_media
    target:
      entity_id: media_player.living_room_speaker
    data:
      media_content_id: https://ice2.somafm.com/groovesalad-256-mp3
      media_content_type: music
  mode: single
- id: new_oceanus_cerberus_health
  alias: Oceanus + Cerberus Health Alerts
  description: Alerts Eddie when NAS drives fail, volume is critical, or UPS goes
    critical
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.oceanus_drive_1_exceeded_max_bad_sectors
    - binary_sensor.oceanus_drive_2_exceeded_max_bad_sectors
    - binary_sensor.oceanus_drive_3_exceeded_max_bad_sectors
    - binary_sensor.oceanus_drive_4_exceeded_max_bad_sectors
    - binary_sensor.oceanus_drive_5_exceeded_max_bad_sectors
    - binary_sensor.oceanus_drive_6_exceeded_max_bad_sectors
    to: 'on'
    id: drive_bad_sectors
  - trigger: state
    entity_id:
    - binary_sensor.oceanus_drive_1_below_min_remaining_life
    - binary_sensor.oceanus_drive_2_below_min_remaining_life
    - binary_sensor.oceanus_drive_3_below_min_remaining_life
    - binary_sensor.oceanus_drive_4_below_min_remaining_life
    - binary_sensor.oceanus_drive_5_below_min_remaining_life
    to: 'on'
    id: drive_life
  - trigger: state
    entity_id: sensor.oceanus_volume_2_status
    to: attention
    id: volume_attention
  - trigger: numeric_state
    entity_id: sensor.oceanus_volume_2_volume_used
    above: 90
    id: volume_full
  - trigger: state
    entity_id: binary_sensor.cerberus_ups_online_status
    to: 'off'
    id: ups_offline
  - trigger: numeric_state
    entity_id: sensor.cerberus_ups_battery
    below: 30
    id: ups_battery_low
  - trigger: numeric_state
    entity_id: sensor.cerberus_ups_time_left
    below: 3
    id: ups_runtime_low
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: drive_bad_sectors
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: "\U0001F6A8 Oceanus Drive Alert"
          message: A drive has exceeded max bad sectors! Check Oceanus DSM immediately.
          data:
            priority: high
            ttl: 0
    - conditions:
      - condition: trigger
        id: drive_life
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: ⚠️ Oceanus Drive Life Warning
          message: A drive is below minimum remaining life. Plan replacement soon.
          data:
            priority: high
    - conditions:
      - condition: trigger
        id: volume_attention
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: ⚠️ Oceanus Volume Attention
          message: Oceanus Volume 2 needs attention. Check DSM storage manager.
          data:
            priority: high
    - conditions:
      - condition: trigger
        id: volume_full
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: "\U0001F4BE Oceanus Almost Full"
          message: Oceanus Volume 2 is over 90% full. Time to free up space.
          data:
            priority: high
    - conditions:
      - condition: trigger
        id: ups_offline
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: "\U0001F50B Cerberus UPS OFFLINE"
          message: UPS has gone offline — on battery or UPS failed!
          data:
            priority: high
            ttl: 0
    - conditions:
      - condition: trigger
        id: ups_battery_low
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: "\U0001F50B Cerberus UPS Battery Low"
          message: UPS battery below 30%. Check runtime immediately.
          data:
            priority: high
            ttl: 0
    - conditions:
      - condition: trigger
        id: ups_runtime_low
      sequence:
      - action: notify.mobile_app_pixel_8_pro
        data:
          title: ⚡ UPS Runtime Critical
          message: Under 3 minutes of UPS runtime! Battery may need replacement (last
            replaced 2019).
          data:
            priority: high
            ttl: 0
  mode: parallel
