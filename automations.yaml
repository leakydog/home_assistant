- id: 'basement_unified_lighting_control'
  alias: Basement – Unified Lighting Control
  description: >
    All 4 smart lights unified. Occupancy + lux <10 → all on at 100% 4000K.
    All clear 1 min → all off. Lux >10 + no occupancy → all off.
    Projector on: SmartLight-1 → red 20% (ignores lux/occupancy).
    SmartLights 2/3/4 stay in normal occupancy mode while projector on.
    Projector off: restore all 4 to occupancy mode.
  triggers:
  - trigger: state
    entity_id: binary_sensor.smartlight_1_occupancy
    id: occupancy_change
  - trigger: state
    entity_id: binary_sensor.smart_night_light_w_occupancy
    id: occupancy_change
  - trigger: state
    entity_id: binary_sensor.smartlight_3_occupancy
    id: occupancy_change
  - trigger: state
    entity_id: binary_sensor.smartlight_4_occupancy
    id: occupancy_change
  # media_player.epson_projector is the canonical source of projector state.
  # remote.epson_projector was previously a duplicate trigger here — removed
  # 2026-04-09 to avoid double-firing. The remote entity is still used for
  # power on/off in the Sofabaton automations (lines 83-103).
  - trigger: state
    entity_id: media_player.epson_projector
    to: 'on'
    id: projector_on
  - trigger: state
    entity_id: media_player.epson_projector
    to: 'off'
    id: projector_off

  actions:
  - delay:
      seconds: 2
  - choose:
    # ── PROJECTOR ON → SmartLight-1 red 20%, lights 2/3/4 follow occupancy
    - conditions:
      - condition: trigger
        id: projector_on
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.smartlight_1
        data:
          brightness_pct: 20
          color_name: red
      - choose:
        - conditions:
          - condition: or
            conditions:
            - condition: state
              entity_id: binary_sensor.smart_night_light_w_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_3_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_4_occupancy
              state: 'on'
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.smart_night_light_w
              - light.smartlight_3
              - light.smartlight_4
            data:
              brightness_pct: 100
              color_temp_kelvin: 4000
        default:
        - action: light.turn_off
          target:
            entity_id:
            - light.smart_night_light_w
            - light.smartlight_3
            - light.smartlight_4

    # ── PROJECTOR OFF → restore all 4 to occupancy mode
    - conditions:
      - condition: trigger
        id: projector_off
      sequence:
      - choose:
        # If anyone is home and it's dark → turn all 4 on
        - conditions:
          - condition: or
            conditions:
            - condition: state
              entity_id: binary_sensor.smartlight_1_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smart_night_light_w_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_3_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_4_occupancy
              state: 'on'
          - condition: or
            conditions:
            - condition: numeric_state
              entity_id: sensor.smartlight_1_illuminance
              below: 10
            - condition: numeric_state
              entity_id: sensor.smart_night_light_w_illuminance
              below: 10
            - condition: numeric_state
              entity_id: sensor.smartlight_3_illuminance
              below: 10
            - condition: numeric_state
              entity_id: sensor.smartlight_4_illuminance
              below: 10
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.smartlight_1
              - light.smart_night_light_w
              - light.smartlight_3
              - light.smartlight_4
            data:
              brightness_pct: 100
              color_temp_kelvin: 4000
        # Otherwise turn all off
        default:
        - action: light.turn_off
          target:
            entity_id:
            - light.smartlight_1
            - light.smart_night_light_w
            - light.smartlight_3
            - light.smartlight_4

    # ── OCCUPANCY CHANGE (projector off/unavailable/standby) → evaluate all sensors
    - conditions:
      - condition: trigger
        id: occupancy_change
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.epson_projector
          state: 'on'
      sequence:
      - choose:
        # Any sensor on → turn all 4 on (no lux check)
        - conditions:
          - condition: or
            conditions:
            - condition: state
              entity_id: binary_sensor.smartlight_1_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smart_night_light_w_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_3_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_4_occupancy
              state: 'on'
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.smartlight_1
              - light.smart_night_light_w
              - light.smartlight_3
              - light.smartlight_4
            data:
              brightness_pct: 100
              color_temp_kelvin: 4000
        # All sensors off → wait 1 min then check again → turn all off.
        # NOTE: this branch previously had a duplicate `sequence:` key inside
        # the same choose item. YAML accepted it but the second key clobbered
        # the first, silently dropping the delay + recheck and turning lights
        # off the instant any sensor flickered. Fixed 2026-04-09 by collapsing
        # into a single sequence with the delay, recheck, then the off action.
        - conditions:
          - condition: state
            entity_id: binary_sensor.smartlight_1_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smart_night_light_w_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_3_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_4_occupancy
            state: 'off'
          sequence:
          - delay:
              minutes: 1
          - condition: state
            entity_id: binary_sensor.smartlight_1_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smart_night_light_w_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_3_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_4_occupancy
            state: 'off'
          - action: light.turn_off
            target:
              entity_id:
              - light.smartlight_1
              - light.smart_night_light_w
              - light.smartlight_3
              - light.smartlight_4

    # ── OCCUPANCY CHANGE (projector ON) → lights 2/3/4 follow occupancy, leave 1 in cinema mode
    - conditions:
      - condition: trigger
        id: occupancy_change
      - condition: state
        entity_id: media_player.epson_projector
        state: 'on'
      sequence:
      - choose:
        - conditions:
          - condition: or
            conditions:
            - condition: state
              entity_id: binary_sensor.smart_night_light_w_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_3_occupancy
              state: 'on'
            - condition: state
              entity_id: binary_sensor.smartlight_4_occupancy
              state: 'on'
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.smart_night_light_w
              - light.smartlight_3
              - light.smartlight_4
            data:
              brightness_pct: 100
              color_temp_kelvin: 4000
        - conditions:
          - condition: state
            entity_id: binary_sensor.smart_night_light_w_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_3_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_4_occupancy
            state: 'off'
          sequence:
          - delay:
              minutes: 1
          - condition: state
            entity_id: binary_sensor.smart_night_light_w_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_3_occupancy
            state: 'off'
          - condition: state
            entity_id: binary_sensor.smartlight_4_occupancy
            state: 'off'
          - action: light.turn_off
            target:
              entity_id:
              - light.smart_night_light_w
              - light.smartlight_3
              - light.smartlight_4
  mode: restart

