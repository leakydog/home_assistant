# ──────────────────────────────────────────────────────────────────────────
# Kids dashboard bedtime gate (added 2026-04-09 — see /clamlings dashboard)
# Toggles input_boolean.kids_bedtime ON at 20:30 and OFF at 06:00 every day.
# Streaming-app picture buttons on the dashboard hide via card visibility
# conditions when this is ON; d-pad / volume / power / find-remote stay
# active so they can finish what's playing.
# ──────────────────────────────────────────────────────────────────────────
- id: kids_bedtime_on
  alias: Kids - Bedtime ON (gray out streaming apps)
  description: Turns on input_boolean.kids_bedtime at 20:30 every day
  triggers:
  - trigger: time
    at: "20:30:00"
  conditions: []
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.kids_bedtime
  mode: single

- id: kids_bedtime_off
  alias: Kids - Bedtime OFF (restore streaming apps)
  description: Turns off input_boolean.kids_bedtime at 06:00 every day
  triggers:
  - trigger: time
    at: "06:00:00"
  conditions: []
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.kids_bedtime
  mode: single
